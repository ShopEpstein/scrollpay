<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrollPay Miner</title>
  <meta name="description" content="ScrollPay miner profile" />
  <link rel="icon" href="/icon128.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #111827; color: #f9fafb; line-height: 1.6; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    nav { border-bottom: 1px solid #1f2937; padding: 0 24px; }
    .nav-inner { max-width: 1040px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 20px 0; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand img { width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0; }
    .brand-text { font-size: 13px; font-weight: 800; color: #F97316; letter-spacing: 2px; }
    .nav-links { display: flex; align-items: center; gap: 16px; }
    .nav-links a { font-size: 14px; font-weight: 600; color: #9ca3af; transition: color .15s; }
    .nav-links a:hover { color: #F97316; }
    .nav-cta { background: #F97316; color: #fff !important; padding: 9px 20px; border-radius: 8px; font-size: 14px; font-weight: 700; white-space: nowrap; }
    .nav-cta:hover { background: #ea6c05 !important; }

    .page { max-width: 640px; margin: 0 auto; padding: 56px 24px 80px; }

    /* Avatar */
    .profile-hero { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 32px; flex-wrap: wrap; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #F97316, #ea6c05); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; color: #fff; flex-shrink: 0; letter-spacing: -1px; }
    .profile-meta { flex: 1; min-width: 0; }
    .profile-handle { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .profile-ref { font-size: 12px; font-family: monospace; color: #6b7280; margin-bottom: 10px; }
    .profile-badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 99px; }
    .badge-xp { background: rgba(249,115,22,.15); border: 1px solid rgba(249,115,22,.3); color: #F97316; }
    .badge-rank { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); color: #9ca3af; }
    .badge-founder { background: rgba(250,204,21,.1); border: 1px solid rgba(250,204,21,.3); color: #fbbf24; }

    /* Bio */
    .bio-section { margin-bottom: 28px; }
    .bio-text { font-size: 15px; color: #d1d5db; line-height: 1.7; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 32px; }
    .stat-card { background: #1f2937; border: 1px solid #374151; border-radius: 12px; padding: 16px 18px; }
    .stat-val { font-size: 22px; font-weight: 800; color: #F97316; margin-bottom: 2px; }
    .stat-lbl { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; }

    /* Socials */
    .socials { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
    .social-link { display: inline-flex; align-items: center; gap: 7px; padding: 7px 14px; background: #1f2937; border: 1px solid #374151; border-radius: 8px; font-size: 13px; font-weight: 600; color: #d1d5db; transition: border-color .15s, color .15s; }
    .social-link:hover { border-color: #F97316; color: #F97316; }
    .social-icon { font-size: 14px; }

    /* Tip addresses */
    .tip-section { margin-bottom: 32px; }
    .tip-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #6b7280; margin-bottom: 10px; }
    .tip-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; background: #1f2937; border: 1px solid #374151; border-radius: 8px; padding: 10px 12px; }
    .tip-chain { font-size: 11px; font-weight: 700; color: #F97316; width: 30px; flex-shrink: 0; }
    .tip-addr { font-family: monospace; font-size: 12px; color: #9ca3af; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tip-copy { background: none; border: 1px solid #374151; border-radius: 5px; color: #6b7280; font-size: 11px; font-weight: 600; padding: 3px 8px; cursor: pointer; flex-shrink: 0; transition: color .15s, border-color .15s; }
    .tip-copy:hover { color: #F97316; border-color: #F97316; }

    /* Not found */
    .not-found { text-align: center; padding: 80px 24px; }
    .not-found h1 { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
    .not-found p { color: #9ca3af; }

    /* Loading */
    .loading { text-align: center; padding: 80px 24px; color: #6b7280; font-size: 14px; }

    footer { border-top: 1px solid #1f2937; padding: 32px 24px; text-align: center; }
    .footer-links { display: flex; justify-content: center; gap: 24px; margin-bottom: 12px; flex-wrap: wrap; }
    .footer-links a { font-size: 13px; color: #6b7280; }
    .footer-links a:hover { color: #F97316; }
    .footer-legal { font-size: 12px; color: #4b5563; }

    @media (max-width: 480px) {
      .profile-handle { font-size: 22px; }
      .page { padding: 36px 16px 60px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="brand" href="/"><img src="/icon128.png" alt="ScrollPay" /><span class="brand-text">SCROLLPAY</span></a>
      <div class="nav-links">
        <a href="/market">XP Market</a>
        <a href="/economics">How It Works</a>
        <a class="nav-cta" href="/#get-started">Install Free</a>
      </div>
    </div>
  </nav>

  <div class="page" id="page-content">
    <div class="loading">Loading profile…</div>
  </div>

  <footer>
    <div class="footer-links">
      <a href="/">Home</a>
      <a href="/market">XP Market</a>
      <a href="/economics">How It Works</a>
      <a href="/privacy">Privacy</a>
    </div>
    <p class="footer-legal">© ScrollPay · XP is an advertising credit, not a financial instrument.</p>
  </footer>

  <script>
    (function () {
      const handle = decodeURIComponent(window.location.pathname.split('/').filter(Boolean).pop() || '');

      if (!handle) {
        document.getElementById('page-content').innerHTML =
          '<div class="not-found"><h1>No profile specified</h1><p>Visit <a href="/" style="color:#F97316">scrollpay.app</a> to get started.</p></div>';
        return;
      }

      document.title = `${handle} · ScrollPay`;

      fetch(`/api/profile?handle=${encodeURIComponent(handle)}`)
        .then(r => r.json())
        .then(data => {
          if (!data.profile) {
            document.getElementById('page-content').innerHTML =
              `<div class="not-found"><h1>Profile not found</h1><p>No miner with the handle <strong>${esc(handle)}</strong> exists yet.</p></div>`;
            return;
          }
          render(data.profile);
        })
        .catch(() => {
          document.getElementById('page-content').innerHTML =
            '<div class="not-found"><h1>Could not load profile</h1><p>Please try again in a moment.</p></div>';
        });

      function render(p) {
        const initials = (p.handle || '?').slice(0, 2).toUpperCase();
        const xpFmt = Number(p.xp || 0).toLocaleString();
        const joinYear = p.joinedAt ? new Date(p.joinedAt).getFullYear() : null;
        const isFounder = p.signupNumber && p.signupNumber <= 100;
        const isEarlyAdopter = p.signupNumber && p.signupNumber <= 500;

        const founderBadge = isFounder
          ? `<span class="badge badge-founder">⚡ Founding Member #${p.signupNumber}</span>`
          : isEarlyAdopter
            ? `<span class="badge badge-founder">⚡ Early Adopter #${p.signupNumber}</span>`
            : '';

        const rankBadge = p.xpRank
          ? `<span class="badge badge-rank">Rank #${p.xpRank.toLocaleString()}</span>`
          : '';

        const socials = [];
        if (p.twitter)   socials.push(`<a href="https://x.com/${esc(p.twitter)}" class="social-link" target="_blank" rel="noopener"><span class="social-icon">𝕏</span>${esc(p.twitter)}</a>`);
        if (p.instagram) socials.push(`<a href="https://instagram.com/${esc(p.instagram)}" class="social-link" target="_blank" rel="noopener"><span class="social-icon">📷</span>${esc(p.instagram)}</a>`);
        if (p.telegram)  socials.push(`<a href="https://t.me/${esc(p.telegram)}" class="social-link" target="_blank" rel="noopener"><span class="social-icon">✈️</span>${esc(p.telegram)}</a>`);
        if (p.website)   socials.push(`<a href="${esc(p.website)}" class="social-link" target="_blank" rel="noopener"><span class="social-icon">🌐</span>${esc(p.website.replace(/^https?:\/\//, ''))}</a>`);

        document.getElementById('page-content').innerHTML = `
          <div class="profile-hero">
            <div class="avatar">${esc(initials)}</div>
            <div class="profile-meta">
              <div class="profile-handle">${esc(p.handle)}</div>
              ${p.refCode ? `<div class="profile-ref">ref: ${esc(p.refCode)}</div>` : ''}
              <div class="profile-badges">
                <span class="badge badge-xp">₿ ${xpFmt} XP mined</span>
                ${rankBadge}
                ${founderBadge}
              </div>
            </div>
          </div>

          ${p.bio ? `<div class="bio-section"><p class="bio-text">${esc(p.bio)}</p></div>` : ''}

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-val">${xpFmt}</div>
              <div class="stat-lbl">Total XP</div>
            </div>
            ${p.xpRank ? `<div class="stat-card"><div class="stat-val">#${p.xpRank.toLocaleString()}</div><div class="stat-lbl">XP Rank</div></div>` : ''}
            ${joinYear ? `<div class="stat-card"><div class="stat-val">${joinYear}</div><div class="stat-lbl">Joined</div></div>` : ''}
          </div>

          ${socials.length ? `<div class="socials">${socials.join('')}</div>` : ''}

          ${(p.btcAddress || p.solAddress) ? `
          <div class="tip-section">
            <div class="tip-label">Tip this miner</div>
            ${p.btcAddress ? `
            <div class="tip-row">
              <span class="tip-chain">BTC</span>
              <span class="tip-addr" title="${esc(p.btcAddress)}">${esc(p.btcAddress)}</span>
              <button class="tip-copy" onclick="copyAddr(this,'${esc(p.btcAddress)}')">Copy</button>
            </div>` : ''}
            ${p.solAddress ? `
            <div class="tip-row">
              <span class="tip-chain">SOL</span>
              <span class="tip-addr" title="${esc(p.solAddress)}">${esc(p.solAddress)}</span>
              <button class="tip-copy" onclick="copyAddr(this,'${esc(p.solAddress)}')">Copy</button>
            </div>` : ''}
          </div>` : ''}

          <div style="margin-top:8px;">
            <a href="/#get-started" style="display:inline-block;background:#F97316;color:#fff;padding:11px 24px;border-radius:9px;font-size:14px;font-weight:700;">Start mining XP →</a>
          </div>
        `;

        document.title = `${p.handle} · ScrollPay Miner`;
      }

      function esc(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      window.copyAddr = function(btn, addr) {
        navigator.clipboard.writeText(addr).then(() => {
          const orig = btn.textContent;
          btn.textContent = 'Copied!';
          btn.style.color = '#22c55e';
          btn.style.borderColor = '#22c55e';
          setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 1800);
        });
      };
    })();
  </script>
</body>
</html>
