<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrollPay Leaderboard</title>
  <meta name="description" content="See who's mining the most XP on ScrollPay today and all-time." />
  <link rel="icon" href="/icon128.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #111827;
      color: #f9fafb;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }

    nav { border-bottom: 1px solid #1f2937; padding: 0 24px; }
    .nav-inner {
      max-width: 900px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 0;
    }
    .brand { font-size: 14px; font-weight: 800; letter-spacing: 2px; color: #f97316; }
    .nav-links { display: flex; gap: 20px; font-size: 13px; color: #9ca3af; }
    .nav-links a:hover { color: #f9fafb; }

    .wrap { max-width: 680px; margin: 0 auto; padding: 48px 24px 80px; }

    h1 { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .sub { font-size: 14px; color: #9ca3af; margin-bottom: 32px; }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab-btn {
      font-size: 13px; font-weight: 600; padding: 7px 18px;
      border-radius: 20px; border: 1px solid #374151;
      background: transparent; color: #9ca3af; cursor: pointer;
      transition: all .15s;
    }
    .tab-btn.active { background: #f97316; border-color: #f97316; color: #fff; }

    /* Table */
    .lb-table { width: 100%; border-collapse: collapse; }
    .lb-table th {
      text-align: left; font-size: 11px; font-weight: 600;
      color: #6b7280; padding: 0 12px 10px; text-transform: uppercase; letter-spacing: .5px;
    }
    .lb-table th:last-child { text-align: right; }
    .lb-table td { padding: 10px 12px; border-top: 1px solid #1f2937; font-size: 14px; }
    .lb-table td:last-child { text-align: right; font-weight: 700; color: #22c55e; }
    .lb-table tr:hover td { background: #1f2937; }

    .rank-cell { width: 40px; font-weight: 700; color: #6b7280; font-size: 13px; }
    .handle-cell { color: #f9fafb; font-weight: 600; }
    .handle-cell a { color: #f97316; }
    .handle-cell a:hover { text-decoration: underline; }
    .anon { color: #6b7280; font-weight: 400; font-style: italic; }
    .recruits-cell { color: #9ca3af; font-size: 13px; }

    .reset-note {
      font-size: 12px; color: #6b7280; margin-top: 20px; text-align: center;
    }
    .empty { text-align: center; color: #6b7280; padding: 40px 0; font-size: 14px; }
    .loading { text-align: center; color: #6b7280; padding: 40px 0; }

    .medals { font-size: 18px; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <div class="brand">SCROLLPAY</div>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/economics">How it works</a>
        <a href="/market">Market</a>
      </div>
    </div>
  </nav>

  <div class="wrap">
    <h1>⛏️ Leaderboard</h1>
    <p class="sub" id="lb-sub">Top miners last 24 hours.</p>

    <div class="tabs">
      <button class="tab-btn active" id="tab-today">Today</button>
      <button class="tab-btn" id="tab-alltime">All-time</button>
    </div>

    <div id="lb-container">
      <div class="loading">Loading…</div>
    </div>

    <p class="reset-note" id="reset-note">Earn XP by watching ads with the <a href="/" style="color:#f97316;">ScrollPay extension</a></p>
  </div>

  <script>
    const MEDALS = ['🥇', '🥈', '🥉'];
    let currentMode = 'today';

    function renderTable(leaders, daily) {
      if (!leaders.length) {
        return `<div class="empty">${daily ? 'No mining activity in the last 24 hours.' : 'No miners yet.'}</div>`;
      }
      const rows = leaders.map((l, i) => {
        const medal = i < 3 ? `<span class="medals">${MEDALS[i]}</span>` : (i + 1);
        const handle = l.hasNickname
          ? `<a href="/profile/${encodeURIComponent(l.handle)}">${escapeHtml(l.handle)}</a>`
          : `<span class="anon">${escapeHtml(l.handle)}</span>`;
        return `<tr>
          <td class="rank-cell">${medal}</td>
          <td class="handle-cell">${handle}</td>
          <td class="recruits-cell">${l.recruits > 0 ? '👥 ' + l.recruits.toLocaleString() : ''}</td>
          <td>${l.xp.toLocaleString()} XP</td>
        </tr>`;
      }).join('');
      return `<table class="lb-table">
        <thead><tr>
          <th>#</th><th>Miner</th><th>Team</th><th style="text-align:right">XP ${daily ? '(24h)' : 'total'}</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function load(mode) {
      currentMode = mode;
      const container = document.getElementById('lb-container');
      container.innerHTML = '<div class="loading">Loading…</div>';
      const daily = mode === 'today';
      try {
        const url = daily
          ? 'https://scrollpay.app/api/leaderboard?daily=1'
          : 'https://scrollpay.app/api/leaderboard';
        const res = await fetch(url);
        const data = await res.json();
        container.innerHTML = renderTable(data.leaders || [], daily);
        document.getElementById('lb-sub').textContent = daily
          ? 'Top 10 miners last 24 hours.'
          : 'Top miners by total XP earned of all time.';
      } catch (e) {
        container.innerHTML = '<div class="empty">Could not load leaderboard.</div>';
      }
    }

    document.getElementById('tab-today').addEventListener('click', () => {
      document.getElementById('tab-today').classList.add('active');
      document.getElementById('tab-alltime').classList.remove('active');
      load('today');
    });

    document.getElementById('tab-alltime').addEventListener('click', () => {
      document.getElementById('tab-alltime').classList.add('active');
      document.getElementById('tab-today').classList.remove('active');
      load('alltime');
    });

    load('today');
  </script>
</body>
</html>
