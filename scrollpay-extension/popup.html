<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrollPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <div class="logo-row">
        <span class="logo-text">SCROLLPAY</span>
        <span class="status-badge"><span class="status-dot"></span> earning XP</span>
      </div>
    </div>

    <!-- XP Balance -->
    <div class="balance-section">
      <div class="balance-label">Your XP</div>
      <div class="balance-amount"><span id="total-xp">—</span> <span class="sats-unit">XP</span></div>
      <div class="balance-sub">
        <span><span id="xp-today">—</span> XP today</span>
        <span class="divider">·</span>
        <span><span id="impressions-today">—</span> ads viewed</span>
      </div>
    </div>

    <!-- Prize Draw -->
    <div class="section draw-section">
      <div class="section-label">Prize Draw</div>
      <div class="draw-card">
        <div class="draw-entries">🎟️ <span id="draw-entries">0</span> entries in the next draw</div>
        <div class="draw-note">Every XP = 1 entry. We draw a winner each week.</div>
      </div>
    </div>

    <!-- Recent Ads -->
    <div class="section">
      <div class="section-label">Recent Ads</div>
      <div id="recent-ads-list" class="recent-ads-list">
        <div class="empty-state">No ads seen yet — start browsing!</div>
      </div>
    </div>

    <!-- Referral -->
    <div class="section referral-section">
      <div class="section-label">Referral Link</div>
      <div class="referral-row">
        <span id="referral-link" class="referral-link">Loading...</span>
        <button class="copy-btn" id="copy-ref-btn">Copy</button>
      </div>
      <div class="referral-note">Earn 50 XP per friend who installs</div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <a href="privacy.html" target="_blank" class="footer-link">Privacy Policy</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
